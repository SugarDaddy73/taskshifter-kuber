# fly.toml app configuration file generated for taskshifter-backend on 2026-03-01T11:06:36+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'taskshifter-backend'
primary_region = 'fra'

[build]
  image = 'vxiop/taskshifter-backend:latest'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
