apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: vxiop/taskshifter-backend:latest
          env:
            - name: DB_HOST
              value: "postgres-service"
            - name: DB_NAME
              value: "taskshifter"
            - name: DB_USERNAME
              value: "postgres"
            - name: DB_PASSWORD
              value: "postgres"
          ports:
            - containerPort: 7700