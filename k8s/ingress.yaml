apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskshifter-frontend-ingress
  namespace: taskshifter
spec:
  ingressClassName: nginx
  rules:
    - host: taskshifter.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 5173
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskshifter-backend-ingress
  namespace: taskshifter
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: taskshifter.local
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend-service
                port:
                  number: 7700