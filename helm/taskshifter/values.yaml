namespace: taskshifter

backend:
  image: vxiop/taskshifter-backend
  tag: latest
  replicas: 1
  port: 7700
  db:
    host: postgres-service
    name: taskshifter
    username: postgres
    password: postgres

frontend:
  image: vxiop/taskshifter-frontend
  tag: latest
  replicas: 1
  port: 80
  servicePort: 5173

postgres:
  image: postgres
  tag: "16"
  replicas: 1
  port: 5432
  username: postgres
  password: postgres
  database: taskshifter

ingress:
  host: taskshifter.local
  ingressClassName: nginx